name: CI

permissions:
  contents: read

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Check Rust formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - name: Run Rust tests
        run: cargo nextest run --locked --workspace --all-features --profile ci
      - name: Upload Rust test results to Codecov
        if: ${{ !cancelled() && hashFiles('target/nextest/ci/junit.xml') != '' }}
        uses: codecov/codecov-action@v5
        with:
          disable_search: true
          files: target/nextest/ci/junit.xml
          name: rust
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}

  web:
    name: Web
    runs-on: ubuntu-latest
    env:
      CHROME_BIN: google-chrome
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json
      - uses: actions/setup-node@v4
        with:
          node-version-file: web/package.json
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@wasm-pack
      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Run web and WASM checks
        working-directory: web
        run: pnpm run check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build debug binary
        run: cargo build --locked --package ppoker
      - name: Upload debug binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary-debug
          path: target/debug/ppoker
      - name: Build release binary
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: cargo build --release --locked --package ppoker
      - name: Upload release binary
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary-release
          path: target/release/ppoker
