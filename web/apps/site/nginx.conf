server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    server_tokens off;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location ^~ /assets/ {
        types {
            application/javascript js mjs;
            application/json json map;
            application/manifest+json webmanifest;
            application/pdf pdf;
            application/vnd.ms-fontobject eot;
            application/wasm wasm;
            application/xml xml;
            audio/mpeg mp3;
            audio/ogg ogg;
            font/otf otf;
            font/ttf ttf;
            font/woff woff;
            font/woff2 woff2;
            image/avif avif;
            image/bmp bmp;
            image/gif gif;
            image/jpeg jpeg jpg;
            image/png png;
            image/svg+xml svg;
            image/tiff tif tiff;
            image/vnd.microsoft.icon ico;
            image/webp webp;
            text/css css;
            text/html htm html;
            text/plain txt;
            video/mp4 mp4;
            video/ogg ogv;
            video/webm webm;
        }
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:avif|bmp|css|eot|gif|html?|ico|jpe?g|js|json|map|mjs|mp3|mp4|ogg|ogv|otf|pdf|png|svg|tiff?|ttf|txt|wasm|webm|webmanifest|webp|woff2?|xml)$ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
